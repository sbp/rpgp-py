<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" role="img" aria-labelledby="title desc">
  <title id="title">Median runtime per operation</title>
  <desc id="desc">Grouped horizontal bar chart comparing rpgp-py, PGPy13, and PGPy across four benchmark categories.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
    .subtitle { font-size: 12px; fill: #475569; }
    .axis { stroke: #475569; stroke-width: 1; }
    .grid { stroke: #e2e8f0; stroke-width: 1; }
    .label { font-size: 14px; fill: #0f172a; }
    .tick { font-size: 12px; fill: #475569; }
    .legend { font-size: 13px; fill: #0f172a; }
    .value { font-size: 12px; fill: #334155; }
    .rpgp { stroke: #2563eb; }
    .pgpy13 { stroke: #f59e0b; }
    .pgpy { stroke: #16a34a; }
  </style>

  <rect width="1100" height="520" fill="#ffffff" />

  <text x="550" y="32" text-anchor="middle" class="title">Median runtime per operation</text>
  <text x="550" y="52" text-anchor="middle" class="subtitle">1 KiB payload, lower is better, milliseconds on a linear scale</text>

  <g aria-label="Legend">
    <line x1="360" y1="76" x2="390" y2="76" class="rpgp" stroke-width="10" stroke-linecap="round" />
    <text x="402" y="81" class="legend">rpgp-py</text>
    <line x1="500" y1="76" x2="530" y2="76" class="pgpy13" stroke-width="10" stroke-linecap="round" />
    <text x="542" y="81" class="legend">PGPy13</text>
    <line x1="625" y1="76" x2="655" y2="76" class="pgpy" stroke-width="10" stroke-linecap="round" />
    <text x="667" y="81" class="legend">PGPy</text>
  </g>

  <g aria-label="Grid">
    <line x1="300" y1="92" x2="300" y2="468" class="axis" />
    <line x1="438" y1="92" x2="438" y2="468" class="grid" />
    <line x1="577" y1="92" x2="577" y2="468" class="grid" />
    <line x1="715" y1="92" x2="715" y2="468" class="grid" />
    <line x1="854" y1="92" x2="854" y2="468" class="grid" />
    <line x1="992" y1="92" x2="992" y2="468" class="grid" />
    <line x1="1020" y1="92" x2="1020" y2="468" class="axis" />

    <line x1="300" y1="194" x2="1020" y2="194" class="grid" />
    <line x1="300" y1="286" x2="1020" y2="286" class="grid" />
    <line x1="300" y1="378" x2="1020" y2="378" class="grid" />
    <line x1="300" y1="468" x2="1020" y2="468" class="axis" />
  </g>

  <g aria-label="Y labels">
    <text x="280" y="152" text-anchor="end" class="label">Parse armored public key</text>
    <text x="280" y="244" text-anchor="end" class="label">Parse armored secret key</text>
    <text x="280" y="336" text-anchor="end" class="label">Detached sign + verify</text>
    <text x="280" y="428" text-anchor="end" class="label">Encrypt + decrypt to recipient</text>
  </g>

  <g aria-label="Bars">
    <line x1="300" y1="128" x2="300.061" y2="128" class="rpgp" stroke-width="10" stroke-linecap="round" />
    <text x="320" y="132" class="value">0.011</text>
    <line x1="300" y1="148" x2="304.353" y2="148" class="pgpy13" stroke-width="10" stroke-linecap="round" />
    <text x="318" y="152" class="value">0.786</text>
    <line x1="300" y1="168" x2="304.298" y2="168" class="pgpy" stroke-width="10" stroke-linecap="round" />
    <text x="318" y="172" class="value">0.776</text>

    <line x1="300" y1="220" x2="300.864" y2="220" class="rpgp" stroke-width="10" stroke-linecap="round" />
    <text x="320" y="224" class="value">0.156</text>
    <line x1="300" y1="240" x2="308.158" y2="240" class="pgpy13" stroke-width="10" stroke-linecap="round" />
    <text x="322" y="244" class="value">1.473</text>
    <line x1="300" y1="260" x2="308.058" y2="260" class="pgpy" stroke-width="10" stroke-linecap="round" />
    <text x="322" y="264" class="value">1.455</text>

    <line x1="300" y1="312" x2="313.586" y2="312" class="rpgp" stroke-width="10" stroke-linecap="round" />
    <text x="326" y="316" class="value">2.453</text>
    <line x1="300" y1="332" x2="639.668" y2="332" class="pgpy13" stroke-width="10" stroke-linecap="round" />
    <text x="650" y="336" class="value">61.329</text>
    <line x1="300" y1="352" x2="640.172" y2="352" class="pgpy" stroke-width="10" stroke-linecap="round" />
    <text x="651" y="356" class="value">61.420</text>

    <line x1="300" y1="404" x2="314.051" y2="404" class="rpgp" stroke-width="10" stroke-linecap="round" />
    <text x="326" y="408" class="value">2.537</text>
    <line x1="300" y1="424" x2="979.713" y2="424" class="pgpy13" stroke-width="10" stroke-linecap="round" />
    <text x="990" y="428" class="value">122.726</text>
    <line x1="300" y1="444" x2="968.498" y2="444" class="pgpy" stroke-width="10" stroke-linecap="round" />
    <text x="979" y="448" class="value">120.701</text>
  </g>

  <g aria-label="X ticks">
    <text x="300" y="488" text-anchor="middle" class="tick">0</text>
    <text x="438" y="488" text-anchor="middle" class="tick">25</text>
    <text x="577" y="488" text-anchor="middle" class="tick">50</text>
    <text x="715" y="488" text-anchor="middle" class="tick">75</text>
    <text x="854" y="488" text-anchor="middle" class="tick">100</text>
    <text x="992" y="488" text-anchor="middle" class="tick">125</text>
    <text x="660" y="510" text-anchor="middle" class="tick">Milliseconds</text>
  </g>
</svg>
