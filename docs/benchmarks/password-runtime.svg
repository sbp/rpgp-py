<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 260" role="img" aria-labelledby="title desc">
  <title id="title">Password encrypt and decrypt runtime</title>
  <desc id="desc">Grouped horizontal bar chart comparing rpgp-py, PGPy13, and PGPy for password encryption and decryption.</desc>
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .title { font-size: 20px; font-weight: 700; fill: #0f172a; }
    .subtitle { font-size: 12px; fill: #475569; }
    .axis { stroke: #475569; stroke-width: 1; }
    .grid { stroke: #e2e8f0; stroke-width: 1; }
    .label { font-size: 14px; fill: #0f172a; }
    .tick { font-size: 12px; fill: #475569; }
    .legend { font-size: 13px; fill: #0f172a; }
    .value { font-size: 12px; fill: #334155; }
    .rpgp { stroke: #2563eb; }
    .pgpy13 { stroke: #f59e0b; }
    .pgpy { stroke: #16a34a; }
  </style>

  <rect width="1100" height="260" fill="#ffffff" />

  <text x="550" y="32" text-anchor="middle" class="title">Password encrypt + decrypt median runtime</text>
  <text x="550" y="52" text-anchor="middle" class="subtitle">Lower is better, milliseconds on a linear scale</text>

  <g aria-label="Legend">
    <line x1="360" y1="76" x2="390" y2="76" class="rpgp" stroke-width="10" stroke-linecap="round" />
    <text x="402" y="81" class="legend">rpgp-py</text>
    <line x1="500" y1="76" x2="530" y2="76" class="pgpy13" stroke-width="10" stroke-linecap="round" />
    <text x="542" y="81" class="legend">PGPy13</text>
    <line x1="625" y1="76" x2="655" y2="76" class="pgpy" stroke-width="10" stroke-linecap="round" />
    <text x="667" y="81" class="legend">PGPy</text>
  </g>

  <g aria-label="Grid">
    <line x1="300" y1="100" x2="300" y2="204" class="axis" />
    <line x1="403" y1="100" x2="403" y2="204" class="grid" />
    <line x1="506" y1="100" x2="506" y2="204" class="grid" />
    <line x1="609" y1="100" x2="609" y2="204" class="grid" />
    <line x1="711" y1="100" x2="711" y2="204" class="grid" />
    <line x1="814" y1="100" x2="814" y2="204" class="grid" />
    <line x1="917" y1="100" x2="917" y2="204" class="grid" />
    <line x1="1020" y1="100" x2="1020" y2="204" class="axis" />
    <line x1="300" y1="204" x2="1020" y2="204" class="axis" />
  </g>

  <text x="280" y="156" text-anchor="end" class="label">Password encrypt + decrypt</text>

  <g aria-label="Bars">
    <line x1="300" y1="128" x2="941.510" y2="128" class="rpgp" stroke-width="12" stroke-linecap="round" />
    <text x="952" y="132" class="value">62.369</text>
    <line x1="300" y1="152" x2="817.845" y2="152" class="pgpy13" stroke-width="12" stroke-linecap="round" />
    <text x="828" y="156" class="value">50.346</text>
    <line x1="300" y1="176" x2="817.258" y2="176" class="pgpy" stroke-width="12" stroke-linecap="round" />
    <text x="828" y="180" class="value">50.289</text>
  </g>

  <g aria-label="X ticks">
    <text x="300" y="224" text-anchor="middle" class="tick">0</text>
    <text x="403" y="224" text-anchor="middle" class="tick">10</text>
    <text x="506" y="224" text-anchor="middle" class="tick">20</text>
    <text x="609" y="224" text-anchor="middle" class="tick">30</text>
    <text x="711" y="224" text-anchor="middle" class="tick">40</text>
    <text x="814" y="224" text-anchor="middle" class="tick">50</text>
    <text x="917" y="224" text-anchor="middle" class="tick">60</text>
    <text x="1020" y="224" text-anchor="middle" class="tick">70</text>
    <text x="660" y="248" text-anchor="middle" class="tick">Milliseconds</text>
  </g>
</svg>
